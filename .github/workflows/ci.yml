name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Run tests automatically every Monday at 6am UTC
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        
        # LOGIC: Install the absolute LATEST versions from PyPI explicitly.
        # This ignores the upper limits in setup.py (e.g., <=2.2.2) to check if new versions work.
        pip install numpy pandas matplotlib seaborn pyarrow openpyxl
        
        # Install your package code, but tell pip NOT to change the libraries we just installed
        pip install -e . --no-deps

    - name: Run tests with pytest
      run: |
        pytest